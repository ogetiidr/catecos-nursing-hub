services:
  # ─── Frontend: React / Vite static site ───────────────────────────────────
  - type: web
    name: catecos-nursing-web
    runtime: static
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile --ignore-scripts &&
      (pnpm --filter @workspace/db run build || true) &&
      (pnpm --filter @workspace/api-zod run build || true) &&
      (pnpm --filter @workspace/api-client-react run build || true) &&
      NODE_ENV=production PORT=3000 BASE_PATH=/ pnpm --filter @workspace/catecos-nursing run build
    staticPublishPath: artifacts/catecos-nursing/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

  # ─── Backend: Express API ─────────────────────────────────────────────────
  - type: web
    name: catecos-nursing-api
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile --ignore-scripts &&
      (pnpm --filter @workspace/db run build || true) &&
      (pnpm --filter @workspace/api-zod run build || true) &&
      pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: catecos-db
          property: connectionString
      - key: LOG_LEVEL
        value: info

# ─── PostgreSQL Database ──────────────────────────────────────────────────
databases:
  - name: catecos-db
    plan: free
    databaseName: catecos_nursing
    user: catecos
